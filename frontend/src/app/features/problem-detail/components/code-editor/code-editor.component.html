<div class="editor">
  <div class="editor__toolbar">
    <span class="editor__title">Solução</span>

    <div class="editor__right">
      <label class="editor__lang">
        <span class="visually-hidden">Linguagem</span>
        <select
          class="lang-select"
          [ngModel]="language()"
          (ngModelChange)="onLanguageSelect($event)">
          @for (l of catalog; track l.id) {
            <option [value]="l.id">{{ l.label }}</option>
          }
        </select>
      </label>

      <a
        class="docs-link"
        [href]="currentMeta().docsUrl"
        target="_blank"
        rel="noopener noreferrer"
        [title]="'Abrir documentação oficial de ' + currentMeta().label">
        📖 Docs
      </a>
    </div>
  </div>

  <!--
    ============================================================
    MOCK do editor Monaco (roda sem dependência externa).

    Para usar o MONACO REAL:
      1. npm install ngx-monaco-editor-v2 monaco-editor
      2. Em app.config.ts adicione aos providers:
           provideMonacoEditor()   // de 'ngx-monaco-editor-v2'
      3. Importe o componente standalone do Monaco neste componente.
      4. Substitua o <textarea> abaixo por:

         <ngx-monaco-editor
           class="editor__monaco"
           [options]="monacoOptions"
           [(ngModel)]="code">
         </ngx-monaco-editor>
    ============================================================
  -->
  <textarea
    class="editor__textarea"
    spellcheck="false"
    [attr.data-lang]="language()"
    [ngModel]="code()"
    (ngModelChange)="code.set($event)">
  </textarea>

  <div class="editor__statusbar">
    <span>{{ currentMeta().label }}</span>
    <span>UTF-8</span>
  </div>
</div>
