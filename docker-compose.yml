# Sobe PostgreSQL + Redis locais para o KeepCoding.
# Uso:  docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: keepcoding-postgres
    environment:
      POSTGRES_DB: keepcoding
      POSTGRES_USER: keepcoding
      POSTGRES_PASSWORD: keepcoding
    ports:
      - "5432:5432"
    volumes:
      - keepcoding_pgdata:/var/lib/postgresql/data

  # Redis para rate-limiting distribuído (Bucket4j via Lettuce).
  # AOF ligado pra manter buckets se container reiniciar; barato pra
  # dados voláteis desta escala.
  redis:
    image: redis:7-alpine
    container_name: keepcoding-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - keepcoding_redisdata:/data

volumes:
  keepcoding_pgdata:
  keepcoding_redisdata:
